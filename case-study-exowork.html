<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0c0a09;
  color: #e7e5e4;
  font-family: 'Libre Baskerville', Georgia, serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.lock {
  text-align: center;
  padding: 24px;
}
.lock p {
  font-size: 14px;
  color: #78716c;
  margin-bottom: 24px;
}
.lock input {
  background: transparent;
  border: none;
  border-bottom: 1px solid #292524;
  color: #e7e5e4;
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 16px;
  padding: 8px 0;
  width: 200px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.lock input::placeholder { color: #292524; }
.lock input:focus { border-color: #78716c; }
.lock input.error {
  border-color: #ef4444;
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.lock .hint {
  font-size: 12px;
  color: #292524;
  margin-top: 16px;
  opacity: 0;
  transition: opacity 0.2s;
}
.lock input.error ~ .hint { opacity: 1; color: #78716c; }
</style>
</head>
